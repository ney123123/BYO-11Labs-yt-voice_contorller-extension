<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>YT Voice — grant microphone</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; color: #222; }
      h1 { font-size: 20px; }
      .card { padding: 20px; border-radius: 8px; }
      .pending { background: #fff3cd; border: 1px solid #ffeeba; }
      .ok { background: #d4edda; border: 1px solid #c3e6cb; }
      .err { background: #f8d7da; border: 1px solid #f5c6cb; }
      button { font-size: 14px; padding: 8px 16px; cursor: pointer; }
      code { background: #f1f1f1; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
      p { line-height: 1.5; }
    </style>
  </head>
  <body>
    <h1>YT Voice — microphone access</h1>
    <p>This page asks Chrome for one-time microphone permission. Once granted, voice control works on every YouTube watch page.</p>
    <div id="status" class="card pending">Ready.</div>
    <p style="margin-top: 24px;"><button id="grant">Grant microphone</button></p>
    <p style="margin-top: 16px; font-size: 12px; color: #666;">
      If Chrome shows a permission prompt, click <strong>Allow</strong>. After it's granted you can close this tab and reload any YouTube watch page.
    </p>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
